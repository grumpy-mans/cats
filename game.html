<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Take Care Of The Whale</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #4fc3f7, #01579b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    .game {
      width: 420px;
      background: rgba(0,0,0,0.35);
      border: 4px solid white;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      font-size: 34px;
    }

    .whale {
      font-size: 120px;
      transition: transform 0.3s;
      user-select: none;
    }

    .whale:hover {
      transform: scale(1.1) rotate(-3deg);
    }

    .stats {
      margin: 20px 0;
      text-align: left;
    }

    .bar {
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 12px;
      height: 24px;
    }

    .fill {
      height: 100%;
      width: 100%;
      transition: width 0.3s;
    }

    .hunger { background: #4caf50; }
    .happy { background: #ffeb3b; }
    .clean { background: #00e5ff; }

    button {
      margin: 6px;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: white;
      color: black;
      font-size: 16px;
      font-weight: bold;
</html>
