<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>mow</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: white;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    h1 {
      color: black;
      font-size: 80px;
      margin-bottom: 20px;
    }

    img {
      width: 350px;
      border-radius: 20px;
      cursor: pointer;
      transition: opacity 0.5s ease, transform 0.2s ease;
      opacity: 1;
    }

    img:hover {
      transform: scale(1.03);
    }
  </style>
</head>
<body>

  <h1>mow</h1>

  <img
    id="cat"
    src="https://preview.redd.it/random-question-but-does-anyone-have-versions-of-this-cat-v0-ya8qikz9kn0f1.png?width=1080&crop=smart&auto=webp&s=4c576b018dd510ee742502d4c71a5f796262d558"
  >

  <script>
    const cat = document.getElementById("cat");

    const original =
      "https://preview.redd.it/random-question-but-does-anyone-have-versions-of-this-cat-v0-ya8qikz9kn0f1.png?width=1080&crop=smart&auto=webp&s=4c576b018dd510ee742502d4c71a5f796262d558";

    const gif =
      "https://media1.tenor.com/m/i_QvXP4bgecAAAAd/cat-cat-meme.gif";

    let busy = false;

    cat.addEventListener("click", () => {
      if (busy) return;

      busy = true;

      cat.style.opacity = "0";

      setTimeout(() => {
        cat.src = gif;
        cat.style.opacity = "1";

        setTimeout(() => {
          cat.style.opacity = "0";

          setTimeout(() => {
            cat.src = original;
            cat.style.opacity = "1";
            busy = false;
          }, 500);

        }, 1000);

      }, 500);
    });
  </script>

</body>
</html>
