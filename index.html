<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOW</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    h1 {
      color: white;
      font-size: 80px;
      margin-bottom: 20px;
      text-shadow: 0 0 20px white;
    }

    img {
      width: 350px;
      border-radius: 20px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h1>mow</h1>

  <img
    id="cat"
    src="https://preview.redd.it/random-question-but-does-anyone-have-versions-of-this-cat-v0-ya8qikz9kn0f1.png?width=1080&crop=smart&auto=webp&s=4c576b018dd510ee742502d4c71a5f796262d558"
  >

  <script>
    const cat = document.getElementById("cat");

    let clicked = false;

    cat.addEventListener("click", () => {
      if (!clicked) {
        cat.src = "https://media1.tenor.com/m/i_QvXP4bgecAAAAd/cat-cat-meme.gif";
        clicked = true;
      } else {
        cat.src = "https://preview.redd.it/random-question-but-does-anyone-have-versions-of-this-cat-v0-ya8qikz9kn0f1.png?width=1080&crop=smart&auto=webp&s=4c576b018dd510ee742502d4c71a5f796262d558";
        clicked = false;
      }
    });
  </script>

</body>
</html>
