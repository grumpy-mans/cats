<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cool cat</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      overflow: hidden;
      font-family: "Arial Narrow", Arial, sans-serif;
    }

    #score {
      font-size: 22px;
      margin-bottom: 10px;
      font-weight: 300;
    }

    #meow {
      font-size: 26px;
      opacity: 0;
      transition: opacity 0.05s linear;
      margin-bottom: 10px;
    }

    #cat {
      width: 360px;
      border-radius: 24px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease;
    }

    .bounce {
      animation: bounce 0.25s ease;
    }

    @keyframes bounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.15); }
      60% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    #resetBtn {
      margin-top: 18px;
      padding: 10px 18px;
      border: none;
      border-radius: 14px;
      background: black;
      color: white;
      font-size: 18px;
      font-family: "Arial Narrow", Arial, sans-serif;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    #resetBtn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  <div id="score">meows: 0</div>
  <div id="meow">meow</div>

  <img id="cat"
    src="https://preview.redd.it/random-question-but-does-anyone-have-versions-of-this-cat-v0-ya8qikz9kn0f1.png?width=1080&crop=smart&auto=webp&s=4c576b018dd510ee742502d4c71a5f796262d558"
  >

  <button id="resetBtn">reset</button>

  <!-- SOUND -->
  <audio id="meowSound" src="meow.mp3" preload="auto"></audio>

  <script>
    const cat = document.getElementById("cat");
    const meow = document.getElementById("meow");
    const scoreText = document.getElementById("score");
    const sound = document.getElementById("meowSound");
    const resetBtn = document.getElementById("resetBtn");

    // LOAD SAVE
    let score = localStorage.getItem("meowScore");

    if (score === null) {
      score = 0;
    } else {
      score = parseInt(score);
    }

    scoreText.textContent = "meows: " + score;

    const normal =
      "https://preview.redd.it/random-question-but-does-anyone-have-versions-of-this-cat-v0-ya8qikz9kn0f1.png?width=1080&crop=smart&auto=webp&s=4c576b018dd510ee742502d4c71a5f796262d558";

    const funny =
      "https://media1.tenor.com/m/i_QvXP4bgecAAAAd/cat-cat-meme.gif";

    cat.addEventListener("click", () => {

      // ADD SCORE
      score++;

      // SAVE SCORE
      localStorage.setItem("meowScore", score);

      // UPDATE TEXT
      scoreText.textContent = "meows: " + score;

      // BOUNCE
      cat.classList.remove("bounce");
      void cat.offsetWidth;
      cat.classList.add("bounce");

      // MEOW TEXT
      meow.style.opacity = "1";

      // IMAGE SWAP
      cat.src = funny;

      // SOUND
      sound.currentTime = 0;
      sound.playbackRate = 2.0;
      sound.play();

      // RESET IMAGE/TEXT
      setTimeout(() => {
        meow.style.opacity = "0";
        cat.src = normal;
      }, 530);

    });

    // RESET BUTTON
    resetBtn.addEventListener("click", () => {

      score = 0;

      localStorage.setItem("meowScore", score);

      scoreText.textContent = "meows: 0";

    });
  </script>

</body>
</html>
