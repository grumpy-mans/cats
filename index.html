<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>cool cat</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: white;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    h1 {
      color: black;
      font-size: 80px;
      margin-bottom: 10px;
      font-weight: normal;
      text-transform: lowercase;
    }

    #meowText {
      font-family: Arial, sans-serif;
      font-weight: 100;
      font-size: 28px;
      margin-bottom: 15px;
      opacity: 0;
      transition: opacity 0.1s linear;
    }

    img {
      width: 350px;
      border-radius: 20px;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.15s ease;
      opacity: 1;
    }

    img:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>

  <h1>cool cat</h1>

  <div id="meowText">meow</div>

  <img
    id="cat"
    src="https://preview.redd.it/random-question-but-does-anyone-have-versions-of-this-cat-v0-ya8qikz9kn0f1.png?width=1080&crop=smart&auto=webp&s=4c576b018dd510ee742502d4c71a5f796262d558"
  >

  <script>
    const cat = document.getElementById("cat");
    const meowText = document.getElementById("meowText");

    const original =
      "https://preview.redd.it/random-question-but-does-anyone-have-versions-of-this-cat-v0-ya8qikz9kn0f1.png?width=1080&crop=smart&auto=webp&s=4c576b018dd510ee742502d4c71a5f796262d558";

    const gif =
      "https://media1.tenor.com/m/i_QvXP4bgecAAAAd/cat-cat-meme.gif";

    let busy = false;

    cat.addEventListener("click", () => {
      if (busy) return;

      busy = true;

      // instant meow
      meowText.style.opacity = "1";

      // instant image switch
      cat.src = gif;

      setTimeout(() => {
        meowText.style.opacity = "0";
      }, 250);

      // switch back faster
      setTimeout(() => {
        cat.style.opacity = "0";

        setTimeout(() => {
          cat.src = original;
          cat.style.opacity = "1";
          busy = false;
        }, 120);

      }, 700);
    });
  </script>

</body>
</html>
